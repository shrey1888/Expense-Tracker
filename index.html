<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Expense Tracker</h1>
      <p class="subtitle">Track your income and expenses</p>
    </header>

    <section class="balance-card">
      <p class="balance-label">Your Balance</p>
      <h2 id="balance">₹0.00</h2>

      <div class="summary">
        <div class="summary-box income-box">
          <p>Income</p>
          <h3 id="income">₹0.00</h3>
        </div>
        <div class="summary-box expense-box">
          <p>Expense</p>
          <h3 id="expense">₹0.00</h3>
        </div>
      </div>
    </section>

    <section class="form-section">
      <h3>Add New Transaction</h3>
      <form id="transaction-form">
        <div class="form-control">
          <label for="text">Description</label>
          <input type="text" id="text" placeholder="e.g. Groceries, Salary" required />
        </div>

        <div class="form-control">
          <label for="amount">Amount</label>
          <input
            type="number"
            id="amount"
            placeholder="Enter positive for income, negative for expense"
            step="0.01"
            required
          />
        </div>

        <div class="form-control">
          <label for="category">Category</label>
          <select id="category">
            <option value="general">General</option>
            <option value="food">Food</option>
            <option value="transport">Transport</option>
            <option value="shopping">Shopping</option>
            <option value="bills">Bills</option>
            <option value="salary">Salary</option>
            <option value="other">Other</option>
          </select>
        </div>

        <button type="submit" class="btn">Add Transaction</button>
      </form>
    </section>

    <section class="history-section">
      <div class="history-header">
        <h3>Transaction History</h3>
        <button id="clear-all" class="btn-clear">Clear All</button>
      </div>
      <ul id="transaction-list" class="transaction-list"></ul>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
